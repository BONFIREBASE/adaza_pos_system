name: adaza_pos_system
description: Adaza POS - a Flutter point-of-sale system for the Adaza business.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.0

  # Firebase / cloud sync
  firebase_core: ^3.3.0
  cloud_firestore: ^5.2.1
  firebase_auth: ^5.1.4

  # Barcode scanning (camera-based Scan_Source)
  mobile_scanner: ^5.1.1

  # Image capture for product photos
  image_picker: ^1.1.2

  # PDF reports + printing
  pdf: ^3.11.1
  printing: ^5.13.2

  # On-screen barcode rendering
  barcode_widget: ^2.0.4

  # Config / secrets
  flutter_dotenv: ^5.1.0

  # Utilities
  intl: ^0.19.0
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
  fonts:
    # Brand display font (ADAZA wordmark + headings).
    - family: National Park
      fonts:
        - asset: assets/font/national-park/NationalPark-Thin.otf
          weight: 200
        - asset: assets/font/national-park/NationalPark-Regular.otf
          weight: 400
        - asset: assets/font/national-park/NationalPark-Heavy.otf
          weight: 800
    - family: National Park Outline
      fonts:
        - asset: assets/font/national-park/NationalPark-Outline.otf
    # Body / UI font.
    - family: SF Pro
      fonts:
        - asset: assets/font/sf-pro/SF-Pro-Text-Regular.otf
          weight: 400
        - asset: assets/font/sf-pro/SF-Pro-Text-RegularItalic.otf
          weight: 400
          style: italic
        - asset: assets/font/sf-pro/SF-Pro-Text-Medium.otf
          weight: 500
        - asset: assets/font/sf-pro/SF-Pro-Text-Semibold.otf
          weight: 600
        - asset: assets/font/sf-pro/SF-Pro-Text-Bold.otf
          weight: 700
    - family: SF Pro Display
      fonts:
        - asset: assets/font/sf-pro/SF-Pro-Display-Regular.otf
          weight: 400
        - asset: assets/font/sf-pro/SF-Pro-Display-Medium.otf
          weight: 500
        - asset: assets/font/sf-pro/SF-Pro-Display-Semibold.otf
          weight: 600
        - asset: assets/font/sf-pro/SF-Pro-Display-Bold.otf
          weight: 700
    # Numeric / monospaced data (prices, totals, barcodes).
    - family: Monospace
      fonts:
        - asset: assets/font/monospace/Monospace.ttf
          weight: 400
        - asset: assets/font/monospace/MonospaceOblique.ttf
          style: italic
        - asset: assets/font/monospace/MonospaceBold.ttf
          weight: 700
