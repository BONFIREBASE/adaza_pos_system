<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Adaza POS — point of sale system.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Adaza POS">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Adaza POS</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #F7F1E3; }

    #adaza-splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      background-image:
        linear-gradient(rgba(247,241,227,0.55), rgba(247,241,227,0.78)),
        url('bg_main.jpg');
      background-size: cover;
      background-position: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      opacity: 1;
      transition: opacity 600ms ease;
    }
    #adaza-splash.hidden { opacity: 0; pointer-events: none; }

    #adaza-splash img {
      height: clamp(220px, 42vh, 380px);
      width: auto;
      max-width: 80vw;
      animation: adaza-pop 700ms ease;
    }
    #adaza-splash .title {
      margin-top: 16px;
      color: #1F6E6A;
      font-weight: 800;
      letter-spacing: 6px;
      font-size: clamp(20px, 4vw, 30px);
    }
    #adaza-splash .subtitle {
      margin-top: 10px;
      color: #8C5A2B;
      font-weight: 600;
      font-size: clamp(14px, 2.4vw, 20px);
      max-width: 420px;
    }

    @keyframes adaza-pop {
      from { transform: scale(0.92); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <!-- Branded loading splash shown until Flutter renders its first frame. -->
  <div id="adaza-splash">
    <img src="adazalogo.png" alt="ADAZA" />
    <div class="title">POINT OF SALE SYSTEM</div>
    <div class="subtitle">Adaza School and Office Supplies Trading and Apparel</div>
  </div>

  <script>
    // Fade out the splash once Flutter has painted its first frame.
    window.addEventListener('flutter-first-frame', function () {
      var splash = document.getElementById('adaza-splash');
      if (!splash) return;
      splash.classList.add('hidden');
      setTimeout(function () { splash.remove(); }, 650);
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
